<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Lisää kappale CSV-tiedostoon</title>
<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #f4f4f4;
}
input, select {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 300px;
    font-size: 16px;
}
button {
    padding: 10px 20px;
    font-size: 18px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
#status {
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Lisää uusi kappale CSV-tiedostoon</h2>

<label>Artisti:</label>
<input id="artisti">

<label>Kappale:</label>
<input id="kappale">

<label>Laite (C/M/K/Youtube):</label>
<input id="laite">

<label>Koodi:</label>
<input id="koodi">

<button onclick="laheta()">Lisää kappale</button>

<div id="status"></div>

<script>
async function laheta() {

    const artisti = document.getElementById("artisti").value.trim();
    const kappale = document.getElementById("kappale").value.trim();
    const laite   = document.getElementById("laite").value.trim();
    const koodi   = document.getElementById("koodi").value.trim();

    if (!artisti || !kappale || !laite || !koodi) {
        document.getElementById("status").innerText = "Täytä kaikki kentät.";
        return;
    }

    const uusiRivi = `${artisti},${kappale},${laite},${koodi}\n`;

    const token = "GITHUB_API_TOKEN_TAHAN";

    const url = "https://api.github.com/repos/LamminHovi/Karaokelista/contents/kappaleet.csv";

    const tiedosto = await fetch(url).then(r => r.json());

    const sisalto = atob(tiedosto.content);

    const uusiSisalto = sisalto + uusiRivi;

    const paivitys = {
        message: "Lisätty uusi kappale automaattisesti",
        content: btoa(unescape(encodeURIComponent(uusiSisalto))),
        sha: tiedosto.sha
    };

    const vastaus = await fetch(url, {
        method: "PUT",
        headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify(paivitys)
    });

    if (vastaus.ok) {
        document.getElementById("status").innerText = "Kappale lisätty onnistuneesti!";
    } else {
        document.getElementById("status").innerText = "Virhe: tarkista GitHub API -avain.";
    }
}
</script>

</body>
</html>
