<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaokelista – Hovi</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    background: #f8f8f8; 
    margin: 0;
    padding: 0 20px;
}

/* Yläotsikko kiinteä */
.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #f8f8f8;
    padding: 10px 20px 5px 20px;
    z-index: 100;
    border-bottom: 1px solid #ccc;
    box-sizing: border-box;
}

.header h1 {
    margin: 0;
}

/* Hakukenttä kiinteä */
.searchbox {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    background: #f8f8f8;
    padding: 5px 20px 10px 20px;
    z-index: 90;
    border-bottom: 1px solid #ccc;
    box-sizing: border-box;
}

#search {
    width: 100%;
    padding: 8px;
    font-size: 16px;
}

/* Sticky-otsikkotaulukko (kopio theadista) */
#stickyHeader {
    position: fixed;
    top: 130px;
    left: 20px;
    right: 20px;
    z-index: 80;
    background: #333;
    color: white;
    border-collapse: collapse;
    display: none;
}

#stickyHeader th {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
    background: #333;
    color: white;
}

/* Varsinainen taulukko alkaa otsikoiden alapuolelta */
table#karaoketable {
    width: 100%;
    border-collapse: collapse;
    margin-top: 155px; /* tilaa header + search + stickyHeader */
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

tr:nth-child(even) {
    background-color: #eee;
}

/* Pienempi fontti Kone ja Koodi sarakkeille — 12px */
td:nth-child(3),
td:nth-child(4) {
    font-size: 12px;
}

/* Kone-sarakkeen värit */
td.kone-M { background-color: #deb887; }
td.kone-K { background-color: #ffb6c1; }
td.kone-C_O { background-color: #ffff99; }
td.kone-C_U { background-color: #ff9999; }
td.kone-M_U { background-color: #ff9999; }
td.kone-C { background-color: #ffffff; }

/* Koodi-sarake harmaaksi */
td.koodi { background-color: #f2f2f2; }

/* Haku-korostus */
tr.highlight { background-color: #fffff9 !important; }
tr.dim { opacity: 0.35; }
</style>
</head>

<body>

<div class="header">
    <h1>Karaokelista – Hovi</h1>
</div>

<div class="searchbox">
    <input type="text" id="search" placeholder="Hae artistia tai kappaletta...">
</div>

<!-- Sticky-otsikkotaulukko (täytetään JS:llä) -->
<table id="stickyHeader">
    <thead>
    <tr>
        <th>Artisti</th>
        <th>Kappale</th>
        <th>Kone</th>
        <th>Koodi</th>
    </tr>
    </thead>
</table>

<table id="karaoketable">
<thead>
<tr>
<th>Artisti</th>
<th>Kappale</th>
<th>Kone</th>
<th>Koodi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
// CSV-lataus
fetch('kappaleet.csv')
  .then(r => r.text())
  .then(csv => {
    const rows = csv.split(/\r?\n/);
    const tbody = document.querySelector("#karaoketable tbody");

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(",");
      if (cols.length < 4) return;

      const artisti = cols[0].trim();
      const kappale = cols[1].trim();
      let kone = cols[2].trim().toUpperCase().replace("-", "_");
      const koodi = cols[3].trim();

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${artisti}</td>
        <td>${kappale}</td>
        <td class="kone-${kone}">${kone}</td>
        <td class="koodi">${koodi}</td>
      `;
      tbody.appendChild(tr);
    });

    // Kun data on ladattu, synkataan sticky-otsikon sarakeleveydet
    syncStickyHeaderWidths();
  });

// Haku
document.getElementById("search").addEventListener("keyup", function() {
  const term = this.value.toLowerCase();
  const rows = document.querySelectorAll("#karaoketable tbody tr");

  rows.forEach(tr => {
    const match = tr.textContent.toLowerCase().includes(term);

    if (term === "") {
      tr.style.display = "";
      tr.classList.remove("highlight", "dim");
    } else {
      tr.style.display = match ? "" : "none";
      tr.classList.toggle("highlight", match);
      tr.classList.toggle("dim", !match);
    }
  });
});

// Synkkaa sticky-otsikon sarakeleveydet varsinaisen taulukon kanssa
function syncStickyHeaderWidths() {
  const table = document.getElementById("karaoketable");
  const sticky = document.getElementById("stickyHeader");

  const bodyRow = table.querySelector("tbody tr");
  if (!bodyRow) return;

  const bodyCells = bodyRow.children;
  const stickyCells = sticky.querySelectorAll("thead th");

  for (let i = 0; i < stickyCells.length && i < bodyCells.length; i++) {
    const w = bodyCells[i].getBoundingClientRect().width;
    stickyCells[i].style.width = w + "px";
  }
}

// Näytä/piilota sticky-otsikko rullauksen mukaan
window.addEventListener("scroll", function() {
  const table = document.getElementById("karaoketable");
  const sticky = document.getElementById("stickyHeader");

  const rect = table.getBoundingClientRect();

  // Kun taulukon yläreuna menee headerin alle, näytetään sticky-otsikko
  if (rect.top < 90) {
    sticky.style.display = "table";
  } else {
    sticky.style.display = "none";
  }
});
</script>

</body>
</html>
