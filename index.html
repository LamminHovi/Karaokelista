<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
body.vaalea {
    background: #ffffff;
    color: #000000;
    font-family: Arial;
    margin: 20px;
}

body.tumma {
    background: #121212;
    color: #e0e0e0;
    font-family: Arial;
    margin: 20px;
}

#ylapalkki {
    position: sticky;
    top: 0;
    background: inherit;
    padding-bottom: 10px;
    z-index: 20;
}

h2 { margin-bottom: 5px; }
input { padding: 6px; width: 320px; }
button { padding: 6px 12px; margin-left: 4px; }
#tulos { margin-top: 10px; font-weight: bold; }

table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #999; padding: 6px 8px; }

body.vaalea thead th {
    background: #eee;
    color: #000;
}

body.tumma thead th {
    background: #1f1f1f;
    color: #fff;
}

thead th {
    position: sticky;
    top: var(--otsikko-top);
    z-index: 10;
}

/* --- MOBIILIVERSIO (B: taulukko säilyy, skaalautuu) --- */
@media (max-width: 600px) {

    body {
        margin: 10px;
    }

    #ylapalkki {
        padding: 10px 0;
    }

    input {
        width: 100%;
        font-size: 16px;
        padding: 10px;
    }

    button {
        padding: 10px 14px;
        font-size: 16px;
        margin-top: 6px;
    }

    table {
        width: 100%;
        font-size: 13px;
    }

    th, td {
        padding: 6px;
        font-size: 13px;
        word-break: break-word;
    }

    /* Artistin ja kappaleen sarakkeet leveämmiksi */
    th:nth-child(1), td:nth-child(1) { width: 45%; }
    th:nth-child(2), td:nth-child(2) { width: 45%; }

    /* Kone ja koodi kapeiksi */
    th:nth-child(3), td:nth-child(3) { width: 5%; }
    th:nth-child(4), td:nth-child(4) { width: 5%; }
}
</style>

<script>
let lista = [];

/* --- KONEVÄRIT: vaalea + tumma teema --- */
function koneVari(kone) {
    const tumma = document.body.classList.contains("tumma");

    if (!tumma) {
        switch (kone) {
            case "C": return "white";
            case "C_O": return "yellow";
            case "C_O_U": return "red";
            case "C_U": return "red";
            case "K": return "#ffb6c1";
            case "M": return "#deb887";
            case "M_U": return "red";
            default: return "white";
        }
    } else {
        switch (kone) {
            case "C": return "#3a3a3a";
            case "C_O": return "#c8a400";
            case "C_O_U": return "#d4b000";
            case "C_U": return "#b22222";
            case "K": return "#8b008b";
            case "M": return "#8b4513";
            case "M_U": return "#ff4500";
            default: return "#3a3a3a";
        }
    }
}

/* --- Sticky otsikon automaattinen korkeus --- */
function paivitaStickyOtsikko() {
    const ylapalkki = document.getElementById("ylapalkki");
    const korkeus = ylapalkki.offsetHeight;
    document.documentElement.style.setProperty("--otsikko-top", korkeus + "px");
}

/* --- CSV LATAUS (fetch) --- */
async function lataaCsv() {
    try {
        const response = await fetch("kappaleet.csv");
        const text = await response.text();
        const rivit = text.trim().split(/\r?\n/).filter(r => r.trim().length > 0);

        lista = rivit.map(r => {
            const [ARTISTI, KAPPALE, KONE, KOODI] = r.split(",").map(x => x.trim().toUpperCase());
            return { ARTISTI, KAPPALE, KONE, KOODI };
        });

        paivitaTaulukko();
    } catch (err) {
        console.error("CSV:n lataus epäonnistui:", err);
    }
}

/* --- PÄIVITYS --- */
function paivitaKaikki() {
    lataaCsv();

    const d = document.getElementById("tulos");
    const nyt = new Date();
    const pvm = nyt.toLocaleDateString("fi-FI");
    const aika = nyt.toLocaleTimeString("fi-FI", {
        hour: "2-digit",
        minute: "2-digit"
    });

    d.textContent = "Tiedot päivitetty: " + pvm + " " + aika;
    paivitaStickyOtsikko();
}

/* --- PÄIVITÄ-NAPPI --- */
function paivitaNappi() {
    document.getElementById("haku").value = "";
    paivitaKaikki();
    paivitaTaulukko();
}

/* --- TAULUKKO --- */
function paivitaTaulukko() {
    const tbody = document.querySelector("#taulukko tbody");
    tbody.innerHTML = "";

    let kopio = [...lista];

    const haku = document.getElementById("haku").value.toUpperCase();
    if (haku.length > 0) {
        kopio = kopio.filter(r =>
            r.ARTISTI.includes(haku) ||
            r.KAPPALE.includes(haku) ||
            r.KONE.includes(haku) ||
            r.KOODI.includes
