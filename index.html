<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaokelista – Hovi</title>

<style>
body { font-family: Arial, sans-serif; background: #f8f8f8; margin: 20px; }

/* MOBIILI */
@media (max-width: 600px) {
    body { margin: 5px; }
    h1 { font-size: 20px; }
    input[type="text"] { font-size: 14px; padding: 6px; }
    th, td { padding: 4px; font-size: 14px; }
    td:nth-child(3), td:nth-child(4) { font-size: 12px; }
}

h1 { text-align: center; }
input[type="text"] { width: 100%; padding: 8px; margin-bottom: 10px; font-size: 16px; }
table { width: 100%; border-collapse: collapse; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
th { background-color: #333; color: white; }
tr:nth-child(even) { background-color: #eee; }

/* Kone-värit */
td.kone-M { background-color: #deb887; }
td.kone-K { background-color: #ffb6c1; }
td.kone-C_O { background-color: #ffff99; }
td.kone-C_U { background-color: #ff9999; }
td.kone-M_U { background-color: #ff9999; }
td.kone-C { background-color: #ffffff; }

/* Koodi */
td.koodi { background-color: #f2f2f2; }

/* Haku-korostus */
tr.highlight { background-color: #ffff99 !important; }
tr.dim { opacity: 0.35; }

/* Virheet */
.error {
    background: #ffdddd;
    border: 1px solid #ff8888;
    padding: 10px;
    margin-bottom: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Karaokelista – Hovi</h1>

<div id="errorbox"></div>

<input type="text" id="search" placeholder="Hae artistia tai kappaletta...">

<table id="karaoketable">
<thead>
<tr>
<th>Artisti</th>
<th>Kappale</th>
<th>Kone</th>
<th>Koodi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
// KORJAAVA TURVAVERSIO
fetch('kappaleet.csv')
  .then(r => r.text())
  .then(csv => {
    const rows = csv.split(/\r?\n/);
    const tbody = document.querySelector("#karaoketable tbody");
    const errorbox = document.getElementById("errorbox");

    rows.forEach((row, index) => {
      if (!row.trim()) return;

      // POISTA ongelmalliset merkit automaattisesti
      row = row.normalize("NFKD").replace(/[^\x00-\x7F]/g, "");

      // JAA pilkulla tai TABilla
      let cols = row.split(",");
      if (cols.length < 4) cols = row.split("\t");

      if (cols.length < 4) {
        errorbox.innerHTML += `<div class="error">Virhe rivillä ${index+1}: "${row}"</div>`;
        return;
      }

      // NORMALISOI konekoodi
      let kone = cols[2].trim().toUpperCase().replace("-", "_");

      const tr = document.createElement("tr");

      // Artisti
      const td1 = document.createElement("td");
      td1.textContent = cols[0].trim();
      tr.appendChild(td1);

      // Kappale
      const td2 = document.createElement("td");
      td2.textContent = cols[1].trim();
      tr.appendChild(td2);

      // Kone
      const td3 = document.createElement("td");
      td3.textContent = kone;

      if (kone === "M") td3.classList.add("kone-M");
      if (kone === "K") td3.classList.add("kone-K");
      if (kone === "C_O") td3.classList.add("kone-C_O");
      if (kone === "C_U") td3.classList.add("kone-C_U");
      if (kone === "M_U") td3.classList.add("kone-M_U");
      if (kone === "C") td3.classList.add("kone-C");

      tr.appendChild(td3);

      // Koodi
      const td4 = document.createElement("td");
      td4.textContent = cols[3].trim();
      td4.classList.add("koodi");
      tr.appendChild(td4);

      tbody.appendChild(tr);
    });
  });

// HAKU + KOROSTUS
document.getElementById("search").addEventListener("keyup", function() {
  const term = this.value.toLowerCase();
  const rows = document.querySelectorAll("#karaoketable tbody tr");

  rows.forEach(tr => {
    const match = tr.textContent.toLowerCase().includes(term);

    if (term === "") {
      tr.style.display = "";
      tr.classList.remove("highlight", "dim");
    } else {
      tr.style.display = match ? "" : "none";
      tr.classList.toggle("highlight", match);
      tr.classList.toggle("dim", !match);
    }
  });
});
</script>

</body>
</html>
