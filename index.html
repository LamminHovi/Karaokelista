<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
body.vaalea {
    background: #ffffff;
    color: #000000;
    font-family: Arial;
    margin: 20px;
}

body.tumma {
    background: #121212;
    color: #e0e0e0;
    font-family: Arial;
    margin: 20px;
}

#ylapalkki {
    position: sticky;
    top: 0;
    background: inherit;
    padding-bottom: 10px;
    z-index: 20;
}

h2 { margin-bottom: 5px; }
input { padding: 6px; width: 320px; }
button { padding: 6px 12px; margin-left: 4px; }
#tulos { margin-top: 10px; font-weight: bold; }

table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #999; padding: 6px 8px; }

body.vaalea thead th {
    background: #eee;
    color: #000;
}

body.tumma thead th {
    background: #1f1f1f;
    color: #fff;
}

thead th {
    position: sticky;
    top: var(--otsikko-top);
    z-index: 10;
}
</style>
</head>

<body class="vaalea">

<div id="ylapalkki">
    <h2>Karaoke kappale haku HOVI</h2>

    <!-- UUSI HAKUKENTTÄ -->
    <input id="haku" type="search" autocomplete="off" placeholder="Hae kappaletta tai artistia...">
    <button onclick="paivita()">Päivitä lista</button>
    <button onclick="tyhjenna()">Tyhjennä haku</button>
</div>
