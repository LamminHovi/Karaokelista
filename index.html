<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaokelista – Hovi</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    background: #f8f8f8; 
    margin: 20px; 
}
h1 { 
    text-align: center; 
}
input[type="text"] { 
    width: 100%; 
    padding: 8px; 
    margin-bottom: 10px; 
    font-size: 16px; 
}
table { 
    width: 100%; 
    border-collapse: collapse; 
}
th, td { 
    border: 1px solid #ccc; 
    padding: 6px; 
    text-align: left; 
}
th { 
    background-color: #333; 
    color: white; 
}
tr:nth-child(even) { 
    background-color: #eee; 
}

/* Pienempi fontti Kone ja Koodi sarakkeille */
td:nth-child(3),
td:nth-child(4) {
    font-size: 14px;
}
</style>
</head>

<body>

<h1>Karaokelista – Hovi</h1>

<input type="text" id="search" placeholder="Hae artistia tai kappaletta...">

<table id="karaoketable">
<thead>
<tr>
<th>Artisti</th>
<th>Kappale</th>
<th>Kone</th>
<th>Koodi</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<script>
// LUE CSV-TIEDOSTO, JOSSA SARAKKEET EROTTUVAT TABILLA
fetch('kappaleet.csv')
  .then(response => response.text())
  .then(csv => {
    const rows = csv.trim().split("\n");
    const tbody = document.querySelector("#karaoketable tbody");

    rows.forEach(row => {
      const cols = row.split("\t"); // <-- TÄRKEÄ MUUTOS
      if (cols.length < 4) return;

      const tr = document.createElement("tr");
      cols.forEach(col => {
        const td = document.createElement("td");
        td.textContent = col.trim();
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });

// HAKU
document.getElementById("search").addEventListener("keyup", function() {
  const term = this.value.toLowerCase();
  document.querySelectorAll("#karaoketable tbody tr").forEach(tr => {
    tr.style.display = tr.textContent.toLowerCase().includes(term) ? "" : "none";
  });
});
</script>

</body>
</html>
