<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaokelista – Hovi</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    background: #f8f8f8; 
    margin: 0;
    padding: 0 20px;
}

/* Yläotsikko sticky */
h1 {
    position: sticky;
    top: 0;
    background: #f8f8f8;
    padding: 15px 0 10px 0;
    margin: 0;
    z-index: 10;
    border-bottom: 1px solid #ccc;
}

/* Hakukenttä sticky */
#search {
    position: sticky;
    top: 60px;
    background: #ffffff;
    padding: 8px;
    margin: 0 0 10px 0;
    font-size: 16px;
    z-index: 9;
    border: 1px solid #ccc;
}

/* Taulukon otsikkorivi sticky */
thead th {
    position: sticky;
    top: 120px;
    background: #333;
    color: white;
    z-index: 8;
}

/* Taulukko normaalisti virrassa */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

tr:nth-child(even) {
    background-color: #eee;
}

/* Pienempi fontti Kone ja Koodi sarakkeille — 12px */
td:nth-child(3),
td:nth-child(4) {
    font-size: 12px;
}

/* Kone-sarakkeen värit */
td.kone-M { background-color: #deb887; }
td.kone-K { background-color: #ffb6c1; }
td.kone-C_O { background-color: #ffff99; }
td.kone-C_U { background-color: #ff9999; }
td.kone-M_U { background-color: #ff9999; }
td.kone-C { background-color: #ffffff; }

/* Koodi-sarake harmaaksi */
td.koodi { background-color: #f2f2f2; }

/* Haku-korostus */
tr.highlight { background-color: #ffff99 !important; }
tr.dim { opacity: 0.35; }
</style>
</head>

<body>

<h1>Karaokelista – Hovi</h1>

<input type="text" id="search" placeholder="Hae artistia tai kappaletta...">

<table id="karaoketable">
<thead>
<tr>
<th>Artisti</th>
<th>Kappale</th>
<th>Kone</th>
<th>Koodi</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('kappaleet.csv')
  .then(r => r.text())
  .then(csv => {
    const rows = csv.split(/\r?\n/);
    const tbody = document.querySelector("#karaoketable tbody");

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(",");
      if (cols.length < 4) return;

      const artisti = cols[0].trim();
      const kappale = cols[1].trim();
      let kone = cols[2].trim().toUpperCase().replace("-", "_");
      const koodi = cols[3].trim();

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${artisti}</td>
        <td>${kappale}</td>
        <td class="kone-${kone}">${kone}</td>
        <td class="koodi">${koodi}</td>
      `;
      tbody.appendChild(tr);
    });
  });

document.getElementById("search").addEventListener("keyup", function() {
  const term = this.value.toLowerCase();
  const rows = document.querySelectorAll("#karaoketable tbody tr");

  rows.forEach(tr => {
    const match = tr.textContent.toLowerCase().includes(term);

    if (term === "") {
      tr.style.display = "";
      tr.classList.remove("highlight", "dim");
    } else {
      tr.style.display = match ? "" : "none";
      tr.classList.toggle("highlight", match);
      tr.classList.toggle("dim", !match);
    }
  });
});
</script>

</body>
</html>
