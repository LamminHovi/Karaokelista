<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaokelista – Hovi</title>

<style>
/* --- TEEMAT --- */
body.day {
    background: #f2f2f2;
    color: #000;
}

body.night {
    background: #222;
    color: #fff;
}

/* --- PÄÄOTSikko --- */
#header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #444;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding-left: 20px;
    line-height: 50px;
    z-index: 1000;
}

/* --- TEEMANAPPI --- */
#themeButton {
    position: fixed;
    top: 10px;
    right: 20px;
    background: #777;
    color: white;
    border: none;
    padding: 6px 12px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    z-index: 1001;
}

/* --- HAKUKENTTÄ --- */
#searchContainer {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    height: 50px;
    background: #333;
    padding: 8px 20px;
    z-index: 1000;
}

body.day #searchContainer {
    background: #ddd;
}

#searchInput {
    width: 95%;
    height: 35px;
    font-size: 16px;
}

/* --- OTSIKKO: Kaikki kappaleet --- */
#subheader {
    position: fixed;
    top: 115px;
    left: 0;
    right: 0;
    height: 35px;
    background: #555;
    color: white;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    line-height: 35px;
    z-index: 1000;
}

body.day #subheader {
    background: #ccc;
    color: #000;
}

/* --- TAULUKKO --- */
table#karaoketable {
    width: 95%;
    margin: 0 auto;
    margin-top: 145px;
    border-collapse: collapse;
}

table#karaoketable th {
    text-align: left;
    padding: 4px;
    border-bottom: 2px solid #666;
    cursor: pointer;
    font-size: 13px;
}

body.day table#karaoketable th {
    border-bottom: 2px solid #999;
}

table#karaoketable td {
    padding: 3px 4px;
    border-bottom: 1px solid #555;
    font-size: 11px;
    line-height: 1.2;
}

body.day table#karaoketable td {
    border-bottom: 1px solid #aaa;
}

/* --- SARAKKEIDEN LEVEYS --- */
table#karaoketable th:nth-child(1),
table#karaoketable td:nth-child(1) { width: 35%; }
table#karaoketable th:nth-child(2),
table#karaoketable td:nth-child(2) { width: 35%; }
table#karaoketable th:nth-child(3),
table#karaoketable td:nth-child(3) { width: 15%; }
table#karaoketable th:nth-child(4),
table#karaoketable td:nth-child(4) { width: 15%; }

/* --- HOVER‑EFEKTI --- */
table#karaoketable tr:hover {
    background-color: rgba(180,180,180,0.3);
}

/* --- KONE‑SARAKKEEN VÄRIT --- */
.kone-M { background-color: #8B4513; color: white; font-size: 10px; }
.kone-K { background-color: #FFB6C1; color: black; font-size: 10px; }
.kone-C_O { background-color: #FFD700; color: black; font-size: 10px; }
.kone-C_U, .kone-M_U { background-color: #FF0000; color: white; font-size: 10px; }
.kone-C { background-color: #FFFFFF; color: black; font-size: 10px; }

/* --- MOBIILIVERSIO --- */
@media (max-width: 600px) {
    #header { font-size: 20px; }
    #searchInput { font-size: 14px; height: 30px; }
    #subheader { font-size: 16px; }
    table#karaoketable th, table#karaoketable td {
        font-size: 9px;
        padding: 2px;
    }
    table#karaoketable {
        width: 98%;
    }
}
</style>
</head>

<body class="day">

<div id="header">Karaokelista – Hovi</div>
<button id="themeButton">Päivä / Yö</button>

<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Hae artistia tai kappaletta...">
</div>

<div id="subheader">Kaikki kappaleet</div>

<table id="karaoketable">
    <thead>
        <tr>
            <th>Artisti</th>
            <th>Kappale</th>
            <th>Kone</th>
            <th>Koodi</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
async function loadCSV() {
    const response = await fetch("kappaleet.csv");
    const text = await response.text();
    const rows = text.trim().split("\n");

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    rows.forEach(line => {
        const parts = line.split(",");
        if (parts.length < 4) return;

        const kone = parts[2].trim();
        let koneClass = "";

        if (kone.startsWith("M_U")) koneClass = "kone-M_U";
        else if (kone.startsWith("M")) koneClass = "kone-M";
        else if (kone.startsWith("K")) koneClass = "kone-K";
        else if (kone.startsWith("C_O")) koneClass = "kone-C_O";
        else if (kone.startsWith("C_U")) koneClass = "kone-C_U";
        else if (kone === "C") koneClass = "kone-C";

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${parts[0]}</td>
            <td>${parts[1]}</td>
            <td class="${koneClass}">${parts[2]}</td>
            <td>${parts[3]}</td>
        `;
        tbody.appendChild(tr);
    });
}

/* --- HAKU --- */
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#tbody tr");
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});

/* --- TEEMAN VAIHTO --- */
document.getElementById("themeButton").addEventListener("click", function() {
    const body = document.body;
    body.classList.toggle("night");
    body.classList.toggle("day");
});

/* --- TAULUKON LAJITTELU --- */
function sortTable(columnIndex) {
    const tbody = document.getElementById("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));
    const ascending = tbody.getAttribute("data-sort-" + columnIndex) !== "asc";

    rows.sort((a, b) => {
        const aText = a.children[columnIndex].innerText.toLowerCase();
        const bText = b.children[columnIndex].innerText.toLowerCase();
        if (aText < bText) return ascending ? -1 : 1;
        if (aText > bText) return ascending ? 1 : -1;
        return 0;
    });

    tbody.setAttribute("data-sort-" + columnIndex, ascending ? "asc" : "desc");
    rows.forEach(row => tbody.appendChild(row));
}

/* --- OTSIKKOJEN KLIKKAUS --- */
document.addEventListener("DOMContentLoaded", () => {
    const headers = document.querySelectorAll("#karaoketable th");
    headers.forEach((th, index) => {
        th.addEventListener("click", () => sortTable(index));
    });
});

loadCSV();
</script>

</body>
</html>
