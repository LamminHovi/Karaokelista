<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
body.vaalea {
    background: #ffffff;
    color: #000000;
    font-family: Arial;
    margin: 20px;
}

body.tumma {
    background: #121212;
    color: #e0e0e0;
    font-family: Arial;
    margin: 20px;
}

#ylapalkki {
    position: sticky;
    top: 0;
    background: inherit;
    padding-bottom: 10px;
    z-index: 20;
}

h2 { margin-bottom: 5px; }
input { padding: 10px; width: 350px; font-size: 18px; }
button { padding: 6px 12px; margin-left: 4px; }
#tulos { margin-top: 10px; font-weight: bold; }

table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #999; padding: 6px 8px; }

tbody tr:hover {
    background: rgba(255, 255, 0, 0.25);
}

body.vaalea thead th {
    background: #eee;
    color: #000;
}

body.tumma thead th {
    background: #1f1f1f;
    color: #fff;
}

thead th {
    position: sticky;
    top: var(--otsikko-top);
    z-index: 10;
}

#eiLoytynyt {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    color: red;
    display: none;
}

@media (max-width: 600px) {
    input { width: 100%; font-size: 20px; padding: 14px; }
    table { font-size: 14px; }
    th, td { padding: 4px; }
    #ylapalkki { padding: 10px; }
}
</style>

<script>
let lista = [];

/* --- KONEVÄRIT --- */
function koneVari(kone) {
    const tumma = document.body.classList.contains("tumma");

    if (!tumma) {
        switch (kone) {
            case "C": return "white";
            case "C_O": return "yellow";
            case "C_O_U": return "red";
            case "C_U": return "red";
            case "K": return "#ffb6c1";
            case "M": return "#deb887";
            case "M_U": return "red";
            default: return "white";
        }
    } else {
        switch (kone) {
            case "C": return "#3a3a3a";
            case "C_O": return "#c8a400";
            case "C_O_U": return "#d4b000";
            case "C_U": return "#b22222";
            case "K": return "#8b008b";
            case "M": return "#8b4513";
            case "M_U": return "#ff4500";
            default: return "#3a3a3a";
        }
    }
}

/* --- Sticky otsikon korkeus --- */
function paivitaStickyOtsikko() {
    const ylapalkki = document.getElementById("ylapalkki");
    const korkeus = ylapalkki.offsetHeight;
    document.documentElement.style.setProperty("--otsikko-top", korkeus + "px");
}

/* --- CSV LATAUS --- */
async function lataaCsv() {
    try {
        const response = await fetch("kappaleet.csv");
        const text = await response.text();
        const rivit = text.trim().split(/\r?\n/).filter(r => r.trim().length > 0);

        lista = rivit.map(r => {
            const [ARTISTI, KAPPALE, KONE, KOODI] = r.split(",").map(x => x.trim().toUpperCase());
            return { ARTISTI, KAPPALE, KONE, KOODI };
        });

        paivitaTaulukko();   // ⭐ Taulukko piirretään vasta kun CSV on ladattu
    } catch (err) {
        console.error("CSV:n lataus epäonnistui:", err);
    }
}

/* --- PÄIVITYS --- */
function paivitaKaikki() {
    lataaCsv();             // ⭐ Lataa CSV ensin
    paivitaStickyOtsikko();
}

/* --- PÄIVITÄ-NAPPI --- */
function paivitaNappi() {
    document.getElementById("haku").value = "";
    paivitaKaikki();
}

/* --- DEBOUNCE (PUHELIMEN HAKU KORJAUS) --- */
let debounceTimer = null;

document.getElementById("haku").addEventListener("input", () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        paivitaTaulukko();
    }, 120);
});

/* --- TAULUKKO + EI LÖYTYNYT + KOROSTUS --- */
function paivitaTaulukko() {
    const tbody = document.querySelector("#taulukko tbody");
    const ei = document.getElementById("eiLoytynyt");
    tbody.innerHTML = "";

    let kopio = [...lista];

    const haku = document.getElementById("haku").value.toUpperCase();

    if (haku.length > 0) {
        kopio = kopio.filter(r =>
            r.ARTISTI.includes(haku) ||
            r.KAPPALE.includes(haku) ||
            r.KONE.includes(haku) ||
            r.KOODI.includes(haku)
        );
    }

    ei.style.display = kopio.length === 0 ? "block" : "none";

    kopio.sort((a, b) =>
        a.ARTISTI.localeCompare(b.ARTISTI) ||
        a.KAPPALE.localeCompare(b.KAPPALE)
    );

    kopio.forEach(r => {
        const tr = document.createElement("tr");

        ["ARTISTI", "KAPPALE", "KONE", "KOODI"].forEach(k => {
            const td = document.createElement("td");

            let teksti = r[k];
            if (haku && teksti.toUpperCase().includes(haku)) {
                const regex = new RegExp(haku, "gi");
                teksti = teksti.replace(regex, m => `<mark>${m}</mark>`);
            }

            td.innerHTML = teksti;

            if (k === "KONE") td.style.backgroundColor = koneVari(r[k]);

            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

/* --- TEEMAN VAIHTO --- */
function vaihdaTeema() {
    const body = document.body;
    const nappi = document.getElementById("teemanappi");

    if (body.classList.contains("tumma")) {
        body.classList.remove("tumma");
        body.classList.add("vaalea");
        nappi.textContent = "Tumma teema";
    } else {
        body.classList.remove("vaalea");
        body.classList.add("tumma");
        nappi.textContent = "Vaalea teema";
    }

    paivitaStickyOtsikko();
    paivitaTaulukko();
}

/* --- KÄYNNISTYS (KORJATTU) --- */
window.onload = () => {
    paivitaKaikki();   // ⭐ Lataa CSV heti → taulukko näkyy heti
};
</script>

</head>

<body class="vaalea">

<div id="ylapalkki">
    <h2>Karaoke kappale haku HOVI</h2>

    <h3>Haku</h3>
    <input id="haku" oninput="paivitaTaulukko()" placeholder="Hae...">
    <button onclick="paivitaNappi()">PÄIVITÄ</button>
    <button onclick="vaihdaTeema()" id="teemanappi">Tumma teema</button>

    <div id="tulos"></div>

    <div id="eiLoytynyt">Ei löytynyt</div>

    <h3>Koko lista</h3>
</div>

<table id="taulukko">
    <thead>
        <tr>
            <th>ARTISTI</th>
            <th>KAPPALE</th>
            <th>KONE</th>
            <th>KOODI</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</body>
</html>
