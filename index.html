<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
body.vaalea {
    background: #ffffff;
    color: #000000;
    font-family: Arial;
    margin: 20px;
}

body.tumma {
    background: #121212;
    color: #e0e0e0;
    font-family: Arial;
    margin: 20px;
}

#ylapalkki {
    position: sticky;
    top: 0;
    background: inherit;
    padding-bottom: 10px;
    z-index: 20;
}

h2 { margin-bottom: 5px; }
input { padding: 10px; width: 350px; font-size: 18px; }
button { padding: 6px 12px; margin-left: 4px; }
#tulos { margin-top: 10px; font-weight: bold; }

table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #999; padding: 6px 8px; }

tbody tr:hover {
    background: rgba(255, 255, 0, 0.25);
}

body.vaalea thead th {
    background: #eee;
    color: #000;
}

body.tumma thead th {
    background: #1f1f1f;
    color: #fff;
}

thead th {
    position: sticky;
    top: var(--otsikko-top);
    z-index: 10;
}

#eiLoytynyt {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    color: red;
    display: none;
}
</style>
</head>

<body class="vaalea">

<div id="ylapalkki">
    <h2>Karaoke kappalehaku</h2>

    <input id="hakusana" placeholder="Hae kappaletta tai artistia..." onkeyup="hae()">

    <button onclick="vaihdaTeema()">Vaihda teema</button>

    <p id="paivitysaika" style="font-size:18px; font-weight:bold; margin-top:10px;">
        Päivitetään...
    </p>

    <div id="tulos"></div>
</div>

<table>
<thead>
<tr>
    <th>Artisti</th>
    <th>Kappale</th>
    <th>Laite</th>
    <th>Koodi</th>
</tr>
</thead>
<tbody id="taulu"></tbody>
</table>

<p id="eiLoytynyt">Ei löytynyt.</p>

<script>
let data = [];
document.documentElement.style.setProperty("--otsikko-top", "110px");

async function lataaCSV() {
    const url = "https://raw.githubusercontent.com/LamminHovi/Karaokelista/main/kappaleet.csv";
    const res = await fetch(url);
    const txt = await res.text();

    data = txt.split("\n").map(r => r.split(","));
}
lataaCSV();

function hae() {
    const sana = document.getElementById("hakusana").value.toLowerCase();
    const tbody = document.getElementById("taulu");
    tbody.innerHTML = "";

    let loytyi = false;

    data.forEach(r => {
        if (r.length < 4) return;

        const [artisti, kappale, laite, koodi] = r;

        if (
            artisti.toLowerCase().includes(sana) ||
            kappale.toLowerCase().includes(sana)
        ) {
            loytyi = true;

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${artisti}</td>
                <td>${kappale}</td>
                <td>${laite}</td>
                <td>${koodi}</td>
            `;
            tbody.appendChild(tr);
        }
    });

    document.getElementById("eiLoytynyt").style.display = loytyi ? "none" : "block";
}

function vaihdaTeema() {
    const body = document.body;
    body.className = body.className === "vaalea" ? "tumma" : "vaalea";
}

/* --- UUSI OMINAISUUS: Viimeksi päivitetty aika --- */
async function haePaivitysaika() {
    const apiUrl = "https://api.github.com/repos/LamminHovi/Karaokelista/commits?path=kappaleet.csv";

    try {
        const res = await fetch(apiUrl);
        const data = await res.json();

        if (!data || !data[0]) {
            document.getElementById("paivitysaika").innerText = "Ei tietoa päivitysajasta";
            return;
        }

        const pvm = new Date(data[0].commit.author.date);

        const paiva = pvm.getDate();
        const kk = pvm.getMonth() + 1;
        const vuosi = pvm.getFullYear();

        const tunnit = pvm.getHours().toString().padStart(2, "0");
        const minuutit = pvm.getMinutes().toString().padStart(2, "0");

        document.getElementById("paivitysaika").innerText =
            `Viimeksi päivitetty: ${paiva}.${kk}.${vuosi} klo ${tunnit}:${minuutit}`;

    } catch (e) {
        document.getElementById("paivitysaika").innerText = "Virhe päivitysajan haussa";
    }
}

haePaivitysaika();
</script>

</body>
</html>
