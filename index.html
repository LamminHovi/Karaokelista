<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
body.vaalea {
    background: #ffffff;
    color: #000000;
    font-family: Arial;
    margin: 20px;
}

body.tumma {
    background: #121212;
    color: #e0e0e0;
    font-family: Arial;
    margin: 20px;
}

#ylapalkki {
    position: sticky;
    top: 0;
    background: inherit;
    padding-bottom: 10px;
    z-index: 20;
}

h2 { margin-bottom: 5px; }
input { padding: 6px; width: 320px; }
button { padding: 6px 12px; margin-left: 4px; }
#tulos { margin-top: 10px; font-weight: bold; }

table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #999; padding: 6px 8px; }

body.vaalea thead th {
    background: #eee;
    color: #000;
}

body.tumma thead th {
    background: #1f1f1f;
    color: #fff;
}

thead th {
    position: sticky;
    top: var(--otsikko-top);
    z-index: 10;
}

@media (max-width: 600px) {
    input { width: 100%; }
    table { font-size: 14px; }
    th, td { padding: 4px; }
    #ylapalkki { padding: 10px; }
}
</style>

<script>
let lista = [];

/* --- KONEVÄRIT: vaalea + tumma teema --- */
function koneVari(kone) {
    const tumma = document.body.classList.contains("tumma");

    if (!tumma) {
        switch (kone) {
            case "C": return "white";
            case "C_O": return "yellow";
            case "C_O_U": return "red";
            case "C_U": return "red";
            case "K": return "#ffb6c1";
            case "M": return "#deb887";
            case "M_U": return "red";
            default: return "white";
        }
    } else {
        switch (kone) {
            case "C": return "#3a3a3a";
            case "C_O": return "#c8a400";
            case "C_O_U": return "#d4b000";
            case "C_U": return "#b22222";
            case "K": return "#8b008b";
            case "M": return "#8b4513";
            case "M_U": return "#ff4500";
            default: return "#3a3a3a";
        }
    }
}

/* --- Sticky otsikon automaattinen korkeus --- */
function paivitaStickyOtsikko() {
    const ylapalkki = document.getElementById("ylapalkki");
    const korkeus = ylapalkki.offsetHeight;
    document.documentElement.style.setProperty("--otsikko-top", korkeus + "px");
}

/* --- CSV LATAUS (fetch) --- */
async function lataaCsv() {
    try {
        const response = await fetch("kappaleet.csv");
        const text = await response.text();
        const rivit = text.trim().split(/\r?\n/).filter(r => r.trim().length > 0);

        lista = rivit.map(r => {
            const [ARTISTI, KAPPALE, KONE, KOODI] = r.split(",").map(x => x.trim().toUpperCase());
            return { ARTISTI, KAPPALE, KONE, KOODI };
        });

        paivitaTaulukko();
    } catch (e) {
        console.error("CSV latausvirhe:", e);
    }
}

/* --- HAKU + DEBOUNCE (PUHELIMEN KORJAUS) --- */
let timer = null;

document.getElementById("haku").addEventListener("input", () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
        hae();
    }, 150);   // 150 ms debounce – korjaa puhelimen viiveen ja tuplakirjaimet
});

/* --- HAKUFUNKTIO --- */
function hae() {
    const hakusana = document.getElementById("haku").value.trim().toUpperCase();

    if (hakusana.length === 0) {
        paivitaTaulukko(lista);
        return;
    }

    const suodatettu = lista.filter(r =>
        r.ARTISTI.includes(hakusana) ||
        r.KAPPALE.includes(hakusana)
    );

    paivitaTaulukko(suodatettu);
}

/* --- TAULUKON PÄIVITYS --- */
function paivitaTaulukko(data = lista) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(r => {
        const tr = document.createElement("tr");
        tr.style.backgroundColor = koneVari(r.KONE);

        tr.innerHTML = `
            <td>${r.ARTISTI}</td>
            <td>${r.KAPPALE}</td>
            <td>${r.KONE}</td>
            <td>${r.KOODI}</td>
        `;

        tbody.appendChild(tr);
    });
}

/* --- KÄYNNISTYS --- */
window.onload = () => {
    paivitaStickyOtsikko();
    lataaCsv();
};
</script>
</head>

<body class="vaalea">

<div id="ylapalkki">
    <h2>Karaoke kappale haku HOVI</h2>

    <h3>Haku</h3>
    <input id="haku" oninput="paivitaTaulukko()" placeholder="Hae...">
    <button onclick="paivitaNappi()">PÄIVITÄ</button>
    <button onclick="vaihdaTeema()" id="teemanappi">Tumma teema</button>

    <div id="tulos"></div>

    <h3>Koko lista</h3>
</div>

<table id="taulukko">
    <thead>
        <tr>
            <th>ARTISTI</th>
            <th>KAPPALE</th>
            <th>KONE</th>
            <th>KOODI</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</body>
</html>
