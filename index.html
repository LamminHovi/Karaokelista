<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaoke kappale haku HOVI</title>

<style>
    body.vaalea {
        background: #ffffff;
        color: #000000;
        font-family: Arial;
        margin: 20px;
    }

    body.tumma {
        background: #121212;
        color: #e0e0e0;
        font-family: Arial;
        margin: 20px;
    }

    #ylapalkki {
        position: sticky;
        top: 0;
        background: inherit;
        padding-bottom: 10px;
        z-index: 20;
    }

    h2 { margin-bottom: 5px; }
    input { padding: 6px; width: 320px; }
    button { padding: 6px 12px; margin-left: 4px; }
    #tulos { margin-top: 10px; font-weight: bold; }

    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #999; padding: 6px 8px; }

    body.vaalea thead th {
        background: #eee;
        color: #000;
    }

    body.tumma thead th {
        background: #1f1f1f;
        color: #fff;
    }

    thead th {
        position: sticky;
        top: var(--otsikko-top);
        z-index: 10;
    }

    @media (max-width: 600px) {
        input { width: 100%; }
        table { font-size: 14px; }
        th, td { padding: 4px; }
        #ylapalkki { padding: 10px; }
    }
</style>

<script>
const fs = require("fs");
let lista = [];

/* --- KONEVÄRIT: vaalea + tumma teema --- */
function koneVari(kone) {
    const tumma = document.body.classList.contains("tumma");

    if (!tumma) {
        switch (kone) {
            case "C": return "white";
            case "C_O": return "yellow";
            case "C_O_U": return "red";
            case "C_U": return "red";
            case "K": return "#ffb6c1";
            case "M": return "#deb887";
            case "M_U": return "red";
            default: return "white";
        }
    } else {
        switch (kone) {
            case "C": return "#3a3a3a";
            case "C_O": return "#c8a400";   // kellertävä
            case "C_O_U": return "#d4b000"; // kellertävä
            case "C_U": return "#b22222";
            case "K": return "#8b008b";
            case "M": return "#8b4513";
            case "M_U": return "#ff4500";
            default: return "#3a3a3a";
        }
    }
}

/* --- Sticky otsikon automaattinen korkeus --- */
function paivitaStickyOtsikko() {
    const ylapalkki = document.getElementById("ylapalkki");
    const korkeus = ylapalkki.offsetHeight;
    document.documentElement.style.setProperty("--otsikko-top", korkeus + "px");
}

/* --- CSV LATAUS --- */
function lataaCsv() {
    const polku = "C:/KappAppNet/kappaleet.csv";
    if (!fs.existsSync(polku)) return;

    const rivit = fs.readFileSync(polku, "utf8")
        .split(/\r?\n/)
        .filter(r => r.trim().length > 0);

    lista = rivit.map(r => {
        const [ARTISTI, KAPPALE, KONE, KOODI] = r.split(",").map(x => x.trim().toUpperCase());
        return { ARTISTI, KAPPALE, KONE, KOODI };
    });

    paivitaTaulukko();
}

/* --- PÄIVITYS --- */
function paivitaKaikki() {
    lataaCsv();

    const d = document.getElementById("tulos");
    const nyt = new Date();
    const pvm = nyt.toLocaleDateString("fi-FI");
    const aika = nyt.toLocaleTimeString("fi-FI", {
        hour: "2-digit",
        minute: "2-digit"
    });

    d.textContent = "Tiedot päivitetty: " + pvm + " " + aika;
    paivitaStickyOtsikko();
}

/* --- PÄIVITÄ-NAPPI --- */
function paivitaNappi() {
    document.getElementById("haku").value = "";
    paivitaKaikki();
    paivitaTaulukko();
}

/* --- TAULUKKO --- */
function paivitaTaulukko() {
    const tbody = document.querySelector("#taulukko tbody");
    tbody.innerHTML = "";

    let kopio = [...lista];

    const haku = document.getElementById("haku").value.toUpperCase();
    if (haku.length > 0) {
        kopio = kopio.filter(r =>
            r.ARTISTI.includes(haku) ||
            r.KAPPALE.includes(haku) ||
            r.KONE.includes(haku) ||
            r.KOODI.includes(haku)
        );
    }

    kopio.sort((a, b) =>
        a.ARTISTI.localeCompare(b.ARTISTI) ||
        a.KAPPALE.localeCompare(b.KAPPALE)
    );

    kopio.forEach(r => {
        const tr = document.createElement("tr");

        ["ARTISTI", "KAPPALE", "KONE", "KOODI"].forEach(k => {
            const td = document.createElement("td");
            td.textContent = r[k];
            if (k === "KONE") td.style.backgroundColor = koneVari(r[k]);
            tr.appendChild(td);
        });

        tbody.appendChild(tr);
    });
}

/* --- TEEMAN VAIHTO --- */
function vaihdaTeema() {
    const body = document.body;
    const nappi = document.getElementById("teemanappi");

    if (body.classList.contains("tumma")) {
        body.classList.remove("tumma");
        body.classList.add("vaalea");
        nappi.textContent = "Tumma teema";
    } else {
        body.classList.remove("vaalea");
        body.classList.add("tumma");
        nappi.textContent = "Vaalea teema";
    }

    paivitaStickyOtsikko();
    paivitaTaulukko();
}

/* --- KÄYNNISTYS --- */
window.onload = () => {
    setTimeout(() => {
        paivitaKaikki();
        setInterval(paivitaKaikki, 3600000);
    }, 200);
};
</script>
</head>

<body class="vaalea">

<div id="ylapalkki">
    <h2>Karaoke kappale haku HOVI</h2>

    <h3>Haku</h3>
    <input id="haku" oninput="paivitaTaulukko()" placeholder="Hae...">
    <button onclick="paivitaNappi()">PÄIVITÄ</button>
    <button onclick="vaihdaTeema()" id="teemanappi">Tumma teema</button>

    <div id="tulos"></div>

    <h3>Koko lista</h3>
</div>

<table id="taulukko">
    <thead>
        <tr>
            <th>ARTISTI</th>
            <th>KAPPALE</th>
            <th>KONE</th>
            <th>KOODI</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</body>
</html>
