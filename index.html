<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaokelista – Hovi</title>

<style>
/* --- TEEMAT --- */
body.day {
    background: #f2f2f2;
    color: #000;
}

body.night {
    background: #222;
    color: #fff;
}

/* --- PÄÄOTSikko --- */
#header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #444;
    color: white;
    font-size: 26px;
    font-weight: bold;
    padding-left: 20px;
    line-height: 50px;
    z-index: 1000;
}

/* --- TEEMANAPPI --- */
#themeButton {
    position: fixed;
    top: 10px;
    right: 20px;
    background: #777;
    color: white;
    border: none;
    padding: 8px 14px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    z-index: 1001;
}

/* --- HAKUKENTTÄ (nyt pääotsikon alla) --- */
#searchContainer {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    height: 60px;
    background: #333;
    padding: 10px 20px;
    z-index: 1000;
}

body.day #searchContainer {
    background: #ddd;
}

#searchInput {
    width: 95%;
    height: 40px;
    font-size: 20px;
}

/* --- TOINEN OTSIKKO (hakukentän alla, koko leveys) --- */
#subheader {
    position: fixed;
    top: 110px;
    left: 0;
    right: 0;
    height: 40px;
    background: #555;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding-left: 20px;
    line-height: 40px;
    z-index: 1000;
}

body.day #subheader {
    background: #ccc;
    color: #000;
}

/* --- TAULUKKO --- */
table#karaoketable {
    width: 95%;
    margin: 0 auto;
    margin-top: 170px;
    border-collapse: collapse;
}

table#karaoketable th {
    text-align: left;
    padding: 8px;
    border-bottom: 2px solid #666;
}

body.day table#karaoketable th {
    border-bottom: 2px solid #999;
}

table#karaoketable td {
    padding: 6px;
    border-bottom: 1px solid #555;
}

body.day table#karaoketable td {
    border-bottom: 1px solid #aaa;
}
</style>
</head>

<body class="night">

<div id="header">Karaokelista – Hovi</div>

<button id="themeButton">Päivä / Yö</button>

<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Hae artistia tai kappaletta...">
</div>

<div id="subheader">Karaokelista – Kaikki kappaleet</div>

<table id="karaoketable">
    <thead>
        <tr>
            <th>Artisti</th>
            <th>Kappale</th>
            <th>Kone</th>
            <th>Koodi</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
/* --- CSV LATAUS --- */
async function loadCSV() {
    const response = await fetch("kappaleet.csv");
    const text = await response.text();
    const rows = text.trim().split("\n");

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    rows.forEach(line => {
        const parts = line.split(",");
        if (parts.length < 4) return;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${parts[0]}</td>
            <td>${parts[1]}</td>
            <td>${parts[2]}</td>
            <td>${parts[3]}</td>
        `;
        tbody.appendChild(tr);
    });
}

/* --- HAKU --- */
document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#tbody tr");

    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});

/* --- TEEMAN VAIHTO --- */
document.getElementById("themeButton").addEventListener("click", function() {
    const body = document.body;

    if (body.classList.contains("night")) {
        body.classList.remove("night");
        body.classList.add("day");
    } else {
        body.classList.remove("day");
        body.classList.add("night");
    }
});

loadCSV();
</script>

</body>
</html>
