<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Karaokelista – Hovi
Artisti | Kappale | Kone | Koodi </title>
<title>  </title>
<style>
body {
    background: #222;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* Yläotsikko – pysyy näkyvissä */
#header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #444;
    color: white;
    font-size: 26px;
    font-weight: bold;
    padding-left: 20px;
    line-height: 50px;
    z-index: 1000;
}

/* Hakukenttä – pysyy näkyvissä */
#searchContainer {
    position: fixed;
    top: 50px;
    left: 0;
    right: 0;
    height: 60px;
    background: #333;
    padding: 10px 20px;
    z-index: 1000;
}

#searchInput {
    width: 95%;
    height: 40px;
    font-size: 20px;
}

/* Normaali taulukko – EI kiinnitetty */
table#karaoketable {
    width: 95%;
    margin: 0 auto;
    margin-top: 130px;   /* tilaa otsikolle + hakukentälle */
    border-collapse: collapse;
}

table#karaoketable th {
    text-align: left;
    padding: 8px;
    border-bottom: 2px solid #666;
}

table#karaoketable td {
    padding: 6px;
    border-bottom: 1px solid #555;
}
</style>
</head>

<body>

<div id="header">Karaokelista – Hovi</div>

<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Hae artistia tai kappaletta...">
</div>

<!-- Normaali taulukko -->
<table id="karaoketable">
    <thead>
        <tr>
            <th>Artisti</th>
            <th>Kappale</th>
            <th>Kone</th>
            <th>Koodi</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<script>
async function loadCSV() {
    const response = await fetch("kappaleet.csv");
    const text = await response.text();
    const rows = text.trim().split("\n");

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    rows.forEach(line => {
        const parts = line.split(",");
        if (parts.length < 4) return;

        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${parts[0]}</td>
            <td>${parts[1]}</td>
            <td>${parts[2]}</td>
            <td>${parts[3]}</td>
        `;
        tbody.appendChild(tr);
    });
}

document.getElementById("searchInput").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#tbody tr");

    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});

loadCSV();
</script>

</body>
</html>
