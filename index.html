<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke kappale haku HOVI</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

h1 {
    text-align: center;
    margin: 20px 0;
}

#searchBox {
    width: 90%;
    margin: 10px auto;
    padding: 12px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #aaa;
    display: block;
}

/* Desktop table */
table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
    display: table;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ccc;
    text-align: left;
}

th {
    background: #333;
    color: white;
}

/* Mobile card layout */
.card {
    display: none;
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.card div {
    margin: 5px 0;
    font-size: 18px;
}

.label {
    font-weight: bold;
    color: #444;
}

/* Switch to card mode under 900px */
@media (max-width: 900px) {
    table {
        display: none;
    }
    .card {
        display: block;
    }
}
</style>
</head>

<body>

<h1>Karaoke kappale haku HOVI</h1>

<input type="text" id="searchBox" placeholder="Hae artistia, kappaletta, konetta tai koodia..." onkeyup="filterList()">

<table id="songTable">
    <thead>
        <tr>
            <th>ARTISTI</th>
            <th>KAPPALE</th>
            <th>KONE</th>
            <th>KOODI</th>
        </tr>
    </thead>
    <tbody id="songBody"></tbody>
</table>

<div id="cardContainer"></div>

<script>
let data = [];

async function loadCSV() {
    const response = await fetch("kappaleet.csv");
    const text = await response.text();

    const rows = text.trim().split("\n").slice(1);

    data = rows.map(r => {
        const [artist, song, machine, code] = r.split(",");
        return { artist, song, machine, code };
    });

    renderTable();
    renderCards();
}

function renderTable() {
    const body = document.getElementById("songBody");
    body.innerHTML = "";

    data.forEach(item => {
        body.innerHTML += `
            <tr>
                <td>${item.artist}</td>
                <td>${item.song}</td>
                <td>${item.machine}</td>
                <td>${item.code}</td>
            </tr>`;
    });
}

function renderCards() {
    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    data.forEach(item => {
        container.innerHTML += `
            <div class="card">
                <div><span class="label">ARTISTI:</span> ${item.artist}</div>
                <div><span class="label">KAPPALE:</span> ${item.song}</div>
                <div><span class="label">KONE:</span> ${item.machine}</div>
                <div><span class="label">KOODI:</span> ${item.code}</div>
            </div>`;
    });
}

function filterList() {
    const q = document.getElementById("searchBox").value.toLowerCase();

    const filtered = data.filter(item =>
        item.artist.toLowerCase().includes(q) ||
        item.song.toLowerCase().includes(q) ||
        item.machine.toLowerCase().includes(q) ||
        item.code.toLowerCase().includes(q)
    );

    const body = document.getElementById("songBody");
    const container = document.getElementById("cardContainer");

    body.innerHTML = "";
    container.innerHTML = "";

    filtered.forEach(item => {
        body.innerHTML += `
            <tr>
                <td>${item.artist}</td>
                <td>${item.song}</td>
                <td>${item.machine}</td>
                <td>${item.code}</td>
            </tr>`;

        container.innerHTML += `
            <div class="card">
                <div><span class="label">ARTISTI:</span> ${item.artist}</div>
                <div><span class="label">KAPPALE:</span> ${item.song}</div>
                <div><span class="label">KONE:</span> ${item.machine}</div>
                <div><span class="label">KOODI:</span> ${item.code}</div>
            </div>`;
    });
}

loadCSV();
</script>

</body>
</html>
