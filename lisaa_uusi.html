<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Lisää kappale CSV:hen</title>
<style>
body { font-family: Arial; max-width: 600px; margin: 30px auto; }
label { display: block; margin-top: 15px; font-weight: bold; }
input, select { width: 100%; padding: 8px; font-size: 16px; }
button { margin-top: 20px; padding: 12px; font-size: 18px; width: 100%; }
#tokenArea { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
</style>
</head>
<body>

<h2>Lisää kappale CSV-tiedostoon</h2>

<div id="tokenArea">
    <label>GitHub Token (tallennetaan vain selaimeesi)</label>
    <input id="token" type="password" placeholder="Syötä token kerran">
    <button onclick="saveToken()">Tallenna token</button>
</div>

<label>Artisti</label>
<input id="artisti">

<label>Kappale (ISOILLA KIRJAIMILLA)</label>
<input id="kappale">

<label>Kone</label>
<select id="kone">
    <option value="C">C – Card (valkoinen)</option>
    <option value="C_O">C_O – Card Oma (keltainen)</option>
    <option value="C_O_U">C_O_U – Card Oma Ulkolainen (punainen)</option>
    <option value="C_U">C_U – Card Ulkolainen (punainen)</option>
    <option value="K">K – Kone (PC) (vaalean punainen)</option>
    <option value="K_U">K_U – KonePC Ulkolainen (violetti)</option>
    <option value="M">M – MadBoy (vaalean ruskea)</option>
    <option value="M_U">M_U – MadBoy Ulkolainen (punainen)</option>
</select>

<label>Koodi</label>
<input id="koodi">

<button onclick="lisaaKappale()">Lisää CSV:hen</button>

<p id="status"></p>

<script>
// UTF-8 yhteensopiva Base64-koodaus
function utf8_to_b64(str) {
    return btoa(unescape(encodeURIComponent(str)));
}
function b64_to_utf8(str) {
    return decodeURIComponent(escape(atob(str)));
}

// Piilota token-kenttä jos token on tallessa
window.onload = () => {
    const token = localStorage.getItem("karaoke_token");
    if (token) {
        document.getElementById("tokenArea").style.display = "none";
    }
};

function saveToken() {
    const t = document.getElementById("token").value.trim();
    if (!t) { alert("Syötä token"); return; }
    localStorage.setItem("karaoke_token", t);
    alert("Token tallennettu!");
    document.getElementById("tokenArea").style.display = "none";
}

async function lisaaKappale() {
    const token = localStorage.getItem("karaoke_token");
    if (!token) {
        alert("Token puuttuu!");
        document.getElementById("tokenArea").style.display = "block";
        return;
    }

    const artisti = document.getElementById("artisti").value.trim();
    let kappale = document.getElementById("kappale").value.trim();
    const kone = document.getElementById("kone").value;
    const koodi = document.getElementById("koodi").value.trim();

    if (!artisti || !kappale) {
        alert("Artisti ja kappale ovat pakollisia.");
        return;
    }

    // 🔥 VAROITUS: jos kappale ei ole ISOILLA
    if (kappale !== kappale.toUpperCase()) {
        const ok = confirm("Kappale ei ole ISOILLA kirjaimilla.\nMuunnetaan automaattisesti ISOIKSI?");
        if (!ok) return;
        kappale = kappale.toUpperCase();
    }

    document.getElementById("status").innerText = "Ladataan CSV...";

    const apiUrl = "https://api.github.com/repos/LamminHovi/Karaokelista/contents/kappaleet.csv";

    // Lataa nykyinen CSV UTF-8 muodossa
    const response = await fetch(apiUrl, {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await response.json();
    const content = b64_to_utf8(data.content);

    // Uusi rivi
    const uusiRivi = `${artisti},${kappale},${kone},${koodi}`;

    // Lisää ja aakkosta
    let rivit = content.split("\n").filter(r => r.trim() !== "");
    rivit.push(uusiRivi);

    rivit.sort((a, b) => {
        const [aArt, aKap] = a.split(",");
        const [bArt, bKap] = b.split(",");
        const aa = aArt.toLowerCase();
        const bb = bArt.toLowerCase();
        if (aa < bb) return -1;
        if (aa > bb) return 1;
        return aKap.toLowerCase().localeCompare(bKap.toLowerCase());
    });

    const uusiCSV = rivit.join("\n");

    // Päivitä GitHubiin UTF-8 Base64 muodossa
    const update = await fetch(apiUrl, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Lisätty kappale",
            content: utf8_to_b64(uusiCSV),
            sha: data.sha
        })
    });

    if (update.ok) {
        document.getElementById("status").innerText =
            "Kappale lisätty (ISOILLA) ja CSV aakkostettu!";
    } else {
        document.getElementById("status").innerText = "Virhe päivityksessä.";
    }
}
</script>

</body>
</html>
