<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Lisää / Muuta / Poista kappale CSV:stä</title>
<style>
body { font-family: Arial; max-width: 700px; margin: 30px auto; }
label { display: block; margin-top: 15px; font-weight: bold; }
input, select { width: 100%; padding: 8px; font-size: 16px; }
button { padding: 12px; font-size: 18px; }
#results div { padding: 8px; border-bottom: 1px solid #ddd; cursor: pointer; }
#results div:hover { background: #f0f0f0; }

/* NAPIT VIEREKKÄIN */
#btnRow {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
#btnRow button {
    flex: 1;
}
</style>
</head>
<body>

<h2>Kappaleiden hallinta (Lisää / Muuta / Poista)</h2>

<!-- MUOKKAUS / LISÄYS -->
<label>Artisti</label>
<input id="artisti">

<label>Kappale (ISOILLA)</label>
<input id="kappale">

<label>Kone</label>
<select id="kone">
    <option value="C">C – Card (valkoinen)</option>
    <option value="C_O">C_O – Card Oma (keltainen)</option>
    <option value="C_O_U">C_O_U – Card Oma Ulkolainen (punainen)</option>
    <option value="C_U">C_U – Card Ulkolainen (punainen)</option>
    <option value="K">K – Kone (PC) (vaalean punainen)</option>
    <option value="K_U">K_U – KonePC Ulkolainen (violetti)</option>
    <option value="M">M – MadBoy (vaalean ruskea)</option>
    <option value="M_U">M_U – MadBoy Ulkolainen (punainen)</option>
</select>

<label>Koodi (max 15 merkkiä)</label>
<input id="koodi">

<!-- NAPIT VIEREKKÄIN -->
<div id="btnRow">
    <button onclick="lisaaKappale()">Lisää uutena</button>
    <button onclick="muutaKappale()">Muuta valittua</button>
    <button onclick="poistaKappale()">Poista valittu</button>
    <button onclick="tyhjenna()">Tyhjennä</button>
</div>

<p id="status"></p>

<hr>

<!-- HAE (ALHAALLA) -->
<label>Hae kappaletta</label>
<input id="haku" placeholder="Hae..." oninput="haeKappale()">

<div id="results"></div>

<script>
// UTF-8 Base64
function utf8_to_b64(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64_to_utf8(str) { return decodeURIComponent(escape(atob(str))); }

// CSV LATAUS (JULKINEN)
async function loadCSV() {
    const apiUrl = "https://api.github.com/repos/LamminHovi/Karaokelista/contents/kappaleet.csv";

    const response = await fetch(apiUrl);
    const data = await response.json();
    const content = b64_to_utf8(data.content);

    return { rows: content.split("\n").filter(r => r.trim() !== ""), sha: data.sha };
}

// HAE
let valittuRivi = null;

async function haeKappale() {
    const haku = document.getElementById("haku").value.toUpperCase();
    const { rows } = await loadCSV();

    const results = document.getElementById("results");
    results.innerHTML = "";

    rows.forEach((r, index) => {
        const [art, kap, kon, kod] = r.split(",");

        if (
            art.toUpperCase().includes(haku) ||
            kap.toUpperCase().includes(haku) ||
            kon.toUpperCase().includes(haku) ||
            kod.toUpperCase().includes(haku)
        ) {
            const div = document.createElement("div");
            div.innerText = `${art} – ${kap} – ${kon} – ${kod}`;
            div.onclick = () => valitseRivi(index, art, kap, kon, kod);
            results.appendChild(div);
        }
    });
}

function valitseRivi(index, art, kap, kon, kod) {
    valittuRivi = index;
    document.getElementById("artisti").value = art;
    document.getElementById("kappale").value = kap;
    document.getElementById("kone").value = kon;
    document.getElementById("koodi").value = kod;
}

// TYHJENNÄ
function tyhjenna() {
    valittuRivi = null;
    document.getElementById("artisti").value = "";
    document.getElementById("kappale").value = "";
    document.getElementById("kone").value = "C";
    document.getElementById("koodi").value = "";
    document.getElementById("status").innerText = "";
    document.getElementById("haku").value = "";
    document.getElementById("results").innerHTML = "";
}

// LISÄÄ
async function lisaaKappale() {
    let artisti = document.getElementById("artisti").value.trim();
    let kappale = document.getElementById("kappale").value.trim();
    const kone = document.getElementById("kone").value;
    const koodi = document.getElementById("koodi").value.trim();

    if (!artisti || !kappale) return alert("Artisti ja kappale pakollisia.");

    if (kappale !== kappale.toUpperCase()) {
        if (!confirm("Kappale ei ole ISOILLA.\nMuunnetaan automaattisesti?")) return;
        kappale = kappale.toUpperCase();
    }

    if (koodi.length > 15) return alert("Koodi saa olla max 15 merkkiä.");

    const { rows, sha } = await loadCSV();

    rows.push(`${artisti},${kappale},${kone},${koodi}`);

    rows.sort((a, b) => {
        const [aArt, aKap] = a.split(",");
        const [bArt, bKap] = b.split(",");
        const aa = aArt.toLowerCase();
        const bb = bArt.toLowerCase();
        if (aa < bb) return -1;
        if (aa > bb) return 1;
        return aKap.toLowerCase().localeCompare(bKap.toLowerCase());
    });

    await paivitaCSV(rows, sha);
    document.getElementById("status").innerText = "Lisätty!";
}

// MUUTA
async function muutaKappale() {
    if (valittuRivi === null) return alert("Valitse ensin kappale haulla.");

    let artisti = document.getElementById("artisti").value.trim();
    let kappale = document.getElementById("kappale").value.trim();
    const kone = document.getElementById("kone").value;
    const koodi = document.getElementById("koodi").value.trim();

    if (kappale !== kappale.toUpperCase()) {
        if (!confirm("Kappale ei ole ISOILLA.\nMuunnetaan automaattisesti?")) return;
        kappale = kappale.toUpperCase();
    }

    if (koodi.length > 15) return alert("Koodi saa olla max 15 merkkiä.");

    const { rows, sha } = await loadCSV();

    rows[valittuRivi] = `${artisti},${kappale},${kone},${koodi}`;

    rows.sort((a, b) => {
        const [aArt, aKap] = a.split(",");
        const [bArt, bKap] = b.split(",");
        const aa = aArt.toLowerCase();
        const bb = bArt.toLowerCase();
        if (aa < bb) return -1;
        if (aa > bb) return 1;
        return aKap.toLowerCase().localeCompare(bKap.toLowerCase());
    });

    await paivitaCSV(rows, sha);
    document.getElementById("status").innerText = "Muutettu!";
}

// POISTA
async function poistaKappale() {
    if (valittuRivi === null) return alert("Valitse ensin kappale haulla.");

    if (!confirm("Poistetaanko kappale?")) return;

    const { rows, sha } = await loadCSV();

    rows.splice(valittuRivi, 1);

    await paivitaCSV(rows, sha);
    document.getElementById("status").innerText = "Poistettu!";
}

// CSV PÄIVITYS (ILMAN TOKENIA)
async function paivitaCSV(rows, sha) {
    const apiUrl = "https://api.github.com/repos/LamminHovi/Karaokelista/contents/kappaleet.csv";

    const uusiCSV = rows.join("\n");

    await fetch(apiUrl, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Päivitetty kappale",
            content: utf8_to_b64(uusiCSV),
            sha: sha
        })
    });
}
</script>

</body>
</html>
